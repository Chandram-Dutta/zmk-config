CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="onlychan keyb"

# Max TX power — stronger signal, better range to the MacBook
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# macOS 15 (Sequoia) negotiates latency=0 if MIN_INT is the ZMK default of 6.
# That kills your battery. 12 (=15ms) keeps macOS happy and respects latency=30.
# See https://github.com/zmkfirmware/zmk/issues/2661
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=12
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=24
CONFIG_BT_PERIPHERAL_PREF_LATENCY=30
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Required by iOS/macOS — they don't always re-subscribe after reconnect
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
