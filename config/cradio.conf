CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="onlychan keyb"
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Additional Bluetooth configuration options
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# Enable higher TX power for better connectivity
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Fast pair configuration
CONFIG_ZMK_BLE_INIT_PRIORITY=50

# Clear bond if unable to connect
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n
